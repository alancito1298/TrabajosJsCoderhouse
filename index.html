
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración de Socios Alan Amarillo</title>

  <!-- Bootstrap opcional para estructura -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <header class="bg-dark text-white text-center p-4">
    <h1>Simulador de Administración de Socios</h1>
  </header>

  <main class="container mt-5">

 

  </main>
<section class="container p-2">
  <form action="" class="container-sm p-2 m-4 bg-light-subtle ">
    <h3>Igrese un socio</h3>
    <div class="mb-3">
      <label for="socioNombre" class="form-label">Nombre</label>
      <input type="text" class="form-control" id="socioNombre" placeholder="Ingrese el nombre aquí">
      <label for="socioDni" class="form-label">DNI</label>
      <input type="number" class="form-control" id="socioDni" placeholder="00.000.000">
      <button type="submit" onclick="agregarSocio(event)" class="btn btn-info">
        Guardar
      </button><button  type="button" class="btn btn-dark" onclick="verSocios(event)">Ver Socios</button>
    </div>
  </form>
</section>
<table class="table container-sm">
  <thead>
    <tr>
      <th>Nombre</th> 
      <th> Dni</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="lista">
   
  </tbody> 
  
  
  
</table>
<footer class="text-center mt-5 p-3 text-muted">
    <p>Proyecto JavaScript - Simulador de Gestión de Socios</p>
  </footer>



  <script src="js/logica.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
