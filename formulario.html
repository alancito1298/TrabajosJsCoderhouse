<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alta de Socios</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>


<!-- NAV -->
<nav class="navbar p-3">
  <div class="">
    <a class="navbar-brand" href="#">
      <img src="./img/logoCentro.jpg" alt="logo Centro de salud" width="100" height="auto">
    </a>
  </div>
  <div>
  <a href="formulario.html" class="btn btn-light">Formulario</a>
  <a href="index.html" class="btn btn-light">Socios</a>
  <a href="pagos.html" class="btn btn-light">Pagos</a></div>  
</nav>

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="mb-4">Alta de Socio</h3>

    <form id="formSocio">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" id="socioNombre" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">DNI</label>
        <input type="number" id="socioDni" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Número de Socio</label>
        <input type="number" id="socioNumero" class="form-control" required>
      </div>
     
      <div class="mb-3">
        <label class="form-label">Número de telefono</label>
        <input type="number" id="celular" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-success w-100">
        Guardar Socio
      </button>
    </form>
  </div>
</div>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- JS -->
<script type="module" src="./js/logica.js"></script>

</body>
</html>
