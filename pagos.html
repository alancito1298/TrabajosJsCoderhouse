<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pagos por Año</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAV -->
<nav class="navbar p-3">
    <div class="">
      <a class="navbar-brand" href="#">
        <img src="./img/logoCentro.jpg" alt="logo Centro de salud" width="100" height="auto">
      </a>
    </div>
    <div>
    <a href="formulario.html" class="btn btn-light">Formulario</a>
    <a href="index.html" class="btn btn-light">Socios</a>
    <a href="pagos.html" class="btn btn-light">Pagos</a></div>  
  </nav>

<div class="container mt-5">

  <div class="card shadow p-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <button id="prevYear" class="btn btn-secondary">⬅️</button>
      <h4 id="tituloAnio">Año 2026</h4>
      <button id="nextYear" class="btn btn-secondary">➡️</button>
    </div>
    <div class="mb-3">
        <input 
          type="text" 
          id="buscadorPagos" 
          class="form-control" 
          placeholder="Buscar socio por nombre o número..."
        >
      </div>
    <div class="table-responsive">
      <table class="table table-bordered text-center align-middle">
        <thead class="table-dark">
          <tr>
            <th>N°</th>
            <th>Socio</th>
            <th>Ene</th>
            <th>Feb</th>
            <th>Mar</th>
            <th>Abr</th>
            <th>May</th>
            <th>Jun</th>
            <th>Jul</th>
            <th>Ago</th>
            <th>Sep</th>
            <th>Oct</th>
            <th>Nov</th>
            <th>Dic</th>
          </tr>
        </thead>

        <tbody id="tablaPagos">
          <!-- JS inserta datos -->
        </tbody>
      </table>
    </div>

  </div>

</div>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- JS -->
<script type="module" src="./js/logica.js"></script>


</body>
</html>
